<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>04 · Mode Select — TwinFit</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#FF5E1A;--bg:#0A0A0A;--s0:#141414;--s1:#1C1C1C;--s2:#242424;--tp:#F5F0EA;--tm:#7A7570;}
html,body{height:100%;background:#0A0A0A;font-family:'DM Sans',sans-serif;}
canvas{position:fixed;inset:0;pointer-events:none;}
.phone{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);width:390px;height:844px;max-height:100vh;overflow:hidden;background:var(--bg);border-radius:40px;box-shadow:0 0 80px rgba(255,94,26,0.12),inset 0 0 0 1px rgba(255,255,255,0.07);display:flex;flex-direction:column;align-items:center;justify-content:center;}
@media(max-width:420px){.phone{border-radius:0;width:100vw;height:100vh;top:0;left:0;transform:none;}}

.rings-wrap{position:relative;width:180px;height:180px;display:flex;align-items:center;justify-content:center;margin-bottom:28px;}
.ring{position:absolute;border-radius:50%;border:1px dashed rgba(255,94,26,0.3);}
.r1{width:180px;height:180px;animation:spin 8s linear infinite;}
.r2{width:124px;height:124px;animation:spin 12s linear infinite reverse;}
@keyframes spin{to{transform:rotate(360deg)}}
.flame{font-size:48px;animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}

h1{font-family:'Bebas Neue',cursive;font-size:44px;letter-spacing:3px;color:var(--tp);text-align:center;margin-bottom:6px;}
.sub{font-size:13px;color:var(--tm);text-align:center;margin-bottom:28px;}

.modes{width:100%;padding:0 24px;display:flex;flex-direction:column;gap:12px;margin-bottom:28px;}
.mode-card{
  display:flex;align-items:center;gap:16px;padding:18px 20px;border-radius:20px;
  border:2px solid rgba(255,255,255,0.06);background:var(--s0);cursor:pointer;
  transition:all 0.25s ease;user-select:none;
}
.mode-card:hover{border-color:rgba(255,94,26,0.4);background:rgba(255,94,26,0.04);}
.mode-card.selected{border-color:var(--primary);background:rgba(255,94,26,0.1);}
.mode-emoji{font-size:38px;flex-shrink:0;}
.mode-info{flex:1;}
.mode-title{font-family:'Bebas Neue',cursive;font-size:20px;letter-spacing:2px;color:var(--tp);margin-bottom:2px;transition:color 0.2s;}
.mode-card.selected .mode-title{color:var(--primary);}
.mode-desc{font-size:12px;color:var(--tm);line-height:1.5;}
.radio{width:20px;height:20px;border-radius:50%;border:2px solid #3A3835;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:border-color 0.2s;}
.mode-card.selected .radio{border-color:var(--primary);}
.radio-dot{width:10px;height:10px;border-radius:50%;background:var(--primary);transform:scale(0);transition:transform 0.2s ease;}
.mode-card.selected .radio-dot{transform:scale(1);}

.cta-wrap{padding:0 24px;width:100%;}
.btn-primary{width:100%;height:56px;border-radius:16px;border:none;cursor:pointer;font-family:'Bebas Neue',cursive;font-size:20px;letter-spacing:3px;color:#fff;background:linear-gradient(135deg,#FF5E1A,#FF8C42);box-shadow:0 0 24px rgba(255,94,26,0.4);transition:all 0.2s;opacity:0.4;pointer-events:none;}
.btn-primary.enabled{opacity:1;pointer-events:auto;}
.btn-primary.enabled:hover{transform:translateY(-2px);box-shadow:0 0 40px rgba(255,94,26,0.6);}

.nav-pill{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:100;background:rgba(20,20,20,0.9);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.08);border-radius:100px;display:flex;align-items:center;gap:8px;padding:8px 16px;font-family:'Bebas Neue',cursive;font-size:12px;letter-spacing:2px;color:var(--tm);}
.nav-pill a{color:var(--primary);text-decoration:none;}
</style>
</head>
<body>
<canvas id="aurora"></canvas>
<div class="nav-pill"><a href="03-signup.html">← 03</a><span>·</span><span style="color:var(--primary)">04</span><span>MODE SELECT</span><span>·</span><a href="05-home.html">05 →</a></div>

<div class="phone">
  <div class="rings-wrap">
    <div class="ring r1"></div>
    <div class="ring r2"></div>
    <span class="flame">🔥</span>
  </div>
  <h1>CHOOSE YOUR MODE</h1>
  <p class="sub">Who are you training with?</p>

  <div class="modes">
    <div class="mode-card" id="coupleCard" onclick="selectMode('couple')">
      <span class="mode-emoji">❤️</span>
      <div class="mode-info">
        <div class="mode-title">Couple Mode</div>
        <div class="mode-desc">Train with your partner. Stay in sync.</div>
      </div>
      <div class="radio"><div class="radio-dot"></div></div>
    </div>
    <div class="mode-card" id="bestiesCard" onclick="selectMode('besties')">
      <span class="mode-emoji">🤝</span>
      <div class="mode-info">
        <div class="mode-title">Besties Mode</div>
        <div class="mode-desc">Accountability squad. No excuses.</div>
      </div>
      <div class="radio"><div class="radio-dot"></div></div>
    </div>
  </div>

  <div class="cta-wrap">
    <button class="btn-primary" id="ctaBtn" onclick="location.href='05-home.html'">START TOGETHER</button>
  </div>
</div>

<script>
let selected=null;
function selectMode(mode){
  selected=mode;
  document.getElementById('coupleCard').classList.toggle('selected',mode==='couple');
  document.getElementById('bestiesCard').classList.toggle('selected',mode==='besties');
  document.getElementById('ctaBtn').classList.add('enabled');
}
const canvas=document.getElementById('aurora'),ctx=canvas.getContext('2d');
let W,H;const resize=()=>{W=canvas.width=innerWidth;H=canvas.height=innerHeight;};resize();window.addEventListener('resize',resize);
const blobs=[{x:0.25,y:0.35,dx:0.0002,dy:0.0001,r:0.45,c:'#FF5E1A'},{x:0.75,y:0.65,dx:-0.0001,dy:0.0002,r:0.4,c:'#FF8C42'}];
(function draw(){ctx.clearRect(0,0,W,H);ctx.fillStyle='#0A0A0A';ctx.fillRect(0,0,W,H);blobs.forEach(b=>{b.x+=b.dx;b.y+=b.dy;if(b.x<0||b.x>1)b.dx*=-1;if(b.y<0||b.y>1)b.dy*=-1;const g=ctx.createRadialGradient(b.x*W,b.y*H,0,b.x*W,b.y*H,b.r*Math.max(W,H));g.addColorStop(0,b.c+'22');g.addColorStop(1,'transparent');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);});requestAnimationFrame(draw);})();
</script>
</body>
</html>
