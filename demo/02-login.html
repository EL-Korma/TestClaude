<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>02 · Login — TwinFit</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#FF5E1A;--bg:#0A0A0A;--s0:#141414;--s1:#1C1C1C;--s2:#242424;--tp:#F5F0EA;--tm:#7A7570;--td:#3A3835;}
html,body{height:100%;background:#0A0A0A;font-family:'DM Sans',sans-serif;}
canvas{position:fixed;inset:0;pointer-events:none;}

.phone{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);width:390px;height:844px;max-height:100vh;overflow-y:auto;background:var(--bg);border-radius:40px;box-shadow:0 0 80px rgba(255,94,26,0.12),inset 0 0 0 1px rgba(255,255,255,0.07);display:flex;flex-direction:column;scrollbar-width:none;}
.phone::-webkit-scrollbar{display:none;}
@media(max-width:420px){.phone{border-radius:0;width:100vw;height:100vh;top:0;left:0;transform:none;}}

.inner{padding:56px 28px 36px;display:flex;flex-direction:column;min-height:100%;}

.back-btn{width:40px;height:40px;border-radius:12px;background:var(--s0);border:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--tp);font-size:18px;margin-bottom:32px;text-decoration:none;flex-shrink:0;transition:border-color 0.2s;}
.back-btn:hover{border-color:var(--primary);}

.logo-badge{width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,#FF5E1A,#FF8C42);display:flex;align-items:center;justify-content:center;font-size:32px;margin-bottom:20px;box-shadow:0 0 24px rgba(255,94,26,0.4);animation:popIn 0.5s ease both;}
@keyframes popIn{from{transform:scale(0.7);opacity:0}to{transform:scale(1);opacity:1}}

h1{font-family:'Bebas Neue',cursive;font-size:48px;letter-spacing:3px;color:var(--tp);margin-bottom:4px;}
.sub{font-size:13px;color:var(--tm);margin-bottom:28px;}

.card{background:var(--s0);border:1px solid rgba(255,255,255,0.06);border-radius:20px;padding:20px;margin-bottom:12px;}
.field-label{font-size:10px;letter-spacing:2px;color:var(--tm);margin-bottom:8px;}
.input{
  width:100%;height:52px;border-radius:12px;border:1.5px solid rgba(255,255,255,0.08);
  background:var(--s1);color:var(--tp);font-family:'DM Sans',sans-serif;font-size:15px;
  padding:0 16px;outline:none;transition:border-color 0.2s,box-shadow 0.2s;
}
.input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(255,94,26,0.15);}
.input::placeholder{color:var(--tm);}
.input-wrap{margin-bottom:14px;}
.input-wrap:last-child{margin-bottom:0;}
.forgot{display:block;text-align:right;color:var(--primary);font-size:12px;cursor:pointer;margin-top:10px;background:none;border:none;font-family:'DM Sans',sans-serif;}
.forgot:hover{text-decoration:underline;}

.btn-primary{width:100%;height:56px;border-radius:16px;border:none;cursor:pointer;
  font-family:'Bebas Neue',cursive;font-size:20px;letter-spacing:3px;color:#fff;
  background:linear-gradient(135deg,#FF5E1A,#FF8C42);box-shadow:0 0 24px rgba(255,94,26,0.4);
  transition:all 0.2s;margin-bottom:16px;}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 0 40px rgba(255,94,26,0.6);}

.divider{display:flex;align-items:center;gap:12px;margin:4px 0 16px;}
.divider-line{flex:1;height:1px;background:var(--s2);}
.divider-text{font-size:12px;color:var(--tm);}

.social-row{display:flex;gap:10px;margin-bottom:24px;}
.social-btn{flex:1;height:48px;border-radius:12px;border:1px solid rgba(255,255,255,0.08);background:var(--s0);color:var(--tp);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:border-color 0.2s,background 0.2s;}
.social-btn:hover{border-color:rgba(255,255,255,0.2);background:var(--s1);}

.signup-row{text-align:center;font-size:13px;color:var(--tm);margin-top:auto;padding-top:16px;}
.signup-row a{color:var(--primary);text-decoration:none;font-weight:600;}
.signup-row a:hover{text-decoration:underline;}

.nav-pill{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:100;background:rgba(20,20,20,0.9);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.08);border-radius:100px;display:flex;align-items:center;gap:8px;padding:8px 16px;font-family:'Bebas Neue',cursive;font-size:12px;letter-spacing:2px;color:var(--tm);}
.nav-pill a{color:var(--primary);text-decoration:none;}
</style>
</head>
<body>
<canvas id="aurora"></canvas>
<div class="nav-pill"><a href="01-splash.html">← 01</a><span>·</span><span style="color:var(--primary)">02</span><span>LOGIN</span><span>·</span><a href="03-signup.html">03 →</a></div>

<div class="phone">
  <div class="inner">
    <a class="back-btn" href="01-splash.html">←</a>
    <div class="logo-badge">🔥</div>
    <h1>SIGN IN</h1>
    <p class="sub">Welcome back, champion.</p>

    <div class="card">
      <div class="input-wrap">
        <div class="field-label">EMAIL</div>
        <input class="input" type="email" placeholder="you@example.com">
      </div>
      <div class="input-wrap">
        <div class="field-label">PASSWORD</div>
        <input class="input" type="password" placeholder="••••••••">
      </div>
      <button class="forgot">Forgot password?</button>
    </div>

    <button class="btn-primary" onclick="location.href='05-home.html'">SIGN IN</button>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">or continue with</span>
      <div class="divider-line"></div>
    </div>

    <div class="social-row">
      <button class="social-btn"><span style="font-weight:700;font-size:15px">G</span> Google</button>
      <button class="social-btn">🍎 Apple</button>
    </div>

    <div class="signup-row">Don't have an account? <a href="03-signup.html">Sign Up</a></div>
  </div>
</div>

<script>
const canvas=document.getElementById('aurora'),ctx=canvas.getContext('2d');
let W,H;const resize=()=>{W=canvas.width=innerWidth;H=canvas.height=innerHeight;};resize();window.addEventListener('resize',resize);
const blobs=[{x:0.2,y:0.5,dx:0.0002,dy:0.0001,r:0.45,c:'#FF5E1A'},{x:0.8,y:0.3,dx:-0.0001,dy:0.0002,r:0.4,c:'#2d1400'}];
(function draw(){ctx.clearRect(0,0,W,H);ctx.fillStyle='#0A0A0A';ctx.fillRect(0,0,W,H);blobs.forEach(b=>{b.x+=b.dx;b.y+=b.dy;if(b.x<0||b.x>1)b.dx*=-1;if(b.y<0||b.y>1)b.dy*=-1;const g=ctx.createRadialGradient(b.x*W,b.y*H,0,b.x*W,b.y*H,b.r*Math.max(W,H));g.addColorStop(0,b.c+'20');g.addColorStop(1,'transparent');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);});requestAnimationFrame(draw);})();
</script>
</body>
</html>
