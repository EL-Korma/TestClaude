<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>05 · Home — TwinFit</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#FF5E1A;--bg:#0A0A0A;--s0:#141414;--s1:#1C1C1C;--s2:#242424;--tp:#F5F0EA;--tm:#7A7570;--td:#3A3835;}
html,body{height:100%;background:#0A0A0A;font-family:'DM Sans',sans-serif;}
canvas{position:fixed;inset:0;pointer-events:none;}
.phone{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);width:390px;height:844px;max-height:100vh;background:var(--bg);border-radius:40px;box-shadow:0 0 80px rgba(255,94,26,0.12),inset 0 0 0 1px rgba(255,255,255,0.07);overflow:hidden;display:flex;flex-direction:column;}
@media(max-width:420px){.phone{border-radius:0;width:100vw;height:100vh;top:0;left:0;transform:none;}}

.scroll{flex:1;overflow-y:auto;scrollbar-width:none;padding:0 0 80px;}
.scroll::-webkit-scrollbar{display:none;}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;padding:52px 22px 16px;}
.header-left p{font-size:10px;letter-spacing:2.5px;color:var(--tm);margin-bottom:3px;}
.header-left h2{font-family:'Bebas Neue',cursive;font-size:24px;letter-spacing:2px;color:var(--tp);}
.avatars{display:flex;}
.ava{width:38px;height:38px;border-radius:50%;background:var(--s1);border:2px solid var(--bg);display:flex;align-items:center;justify-content:center;font-size:18px;}
.ava:first-child{z-index:2;}
.ava:last-child{margin-left:-12px;z-index:1;}

.px{padding:0 22px;}

/* Streak card */
.streak-card{border-radius:24px;padding:22px;margin:0 22px 14px;background:linear-gradient(135deg,#1a0800,#2d1200);border:1px solid rgba(255,94,26,0.2);position:relative;overflow:hidden;}
.orb-bg{position:absolute;top:-40px;right:-40px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(255,94,26,0.18) 0%,transparent 70%);}
.streak-top{display:flex;align-items:center;gap:16px;margin-bottom:16px;}
.flame-big{font-size:44px;animation:pulse 2s ease-in-out infinite;filter:drop-shadow(0 0 12px rgba(255,94,26,0.5));}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.streak-num{font-family:'Bebas Neue',cursive;font-size:80px;line-height:1;color:var(--primary);}
.streak-label{font-family:'Bebas Neue',cursive;font-size:22px;letter-spacing:2px;color:var(--tp);}
.streak-sub{font-family:'Bebas Neue',cursive;font-size:12px;letter-spacing:2px;color:var(--tm);}

.duo-row{display:flex;gap:10px;margin-bottom:16px;}
.duo-pill{flex:1;border-radius:12px;padding:10px 12px;background:rgba(255,255,255,0.04);display:flex;align-items:center;gap:8px;}
.duo-name{font-family:'Bebas Neue',cursive;font-size:14px;letter-spacing:1px;color:var(--tp);}
.duo-status{font-size:11px;color:var(--tm);}

.day-strip{display:flex;gap:6px;}
.day-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;}
.day-lbl{font-size:10px;color:var(--tm);}
.day-pip{width:100%;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;}
.day-pip.done{background:rgba(255,94,26,0.22);}
.day-pip.today{background:rgba(255,94,26,0.5);border:1px solid var(--primary);}
.day-pip.empty{background:var(--s2);}

/* Quick actions */
.actions{display:flex;gap:10px;margin:0 22px 14px;}
.act-btn{flex:1;height:64px;border-radius:18px;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;transition:all 0.2s;}
.act-btn.primary{background:linear-gradient(135deg,#FF5E1A,#FF8C42);box-shadow:0 0 20px rgba(255,94,26,0.35);}
.act-btn.primary:hover{transform:translateY(-2px);box-shadow:0 0 32px rgba(255,94,26,0.55);}
.act-btn.secondary{background:var(--s0);border:1px solid rgba(255,255,255,0.06);}
.act-btn.secondary:hover{border-color:rgba(255,94,26,0.4);background:rgba(255,94,26,0.06);}
.act-icon{font-size:22px;}
.act-lbl{font-family:'Bebas Neue',cursive;font-size:10px;letter-spacing:2px;color:var(--tp);}
.act-btn.secondary .act-lbl{color:var(--tm);}

/* Card */
.card{background:var(--s0);border:1px solid rgba(255,255,255,0.06);border-radius:20px;padding:16px 18px;margin:0 22px 14px;display:flex;align-items:center;gap:14px;}
.card-icon-box{width:52px;height:52px;border-radius:16px;background:rgba(255,94,26,0.1);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;}
.card-title-lbl{font-size:10px;letter-spacing:2px;color:var(--tm);margin-bottom:2px;}
.card-title{font-family:'Bebas Neue',cursive;font-size:18px;letter-spacing:1px;color:var(--tp);}
.card-sub{font-size:12px;color:var(--tm);}

/* Locked cards */
.section-lbl{font-size:10px;letter-spacing:2.5px;color:var(--tm);margin:4px 22px 10px;}
.h-scroll{display:flex;gap:10px;overflow-x:auto;padding:0 22px 4px;scrollbar-width:none;}
.h-scroll::-webkit-scrollbar{display:none;}
.locked-card{min-width:110px;height:120px;border-radius:18px;background:var(--s0);border:1px solid rgba(255,255,255,0.05);flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;}
.locked-card span:first-child{font-size:30px;opacity:0.25;}
.locked-name{font-family:'Bebas Neue',cursive;font-size:12px;letter-spacing:2px;color:var(--td);}

/* Bottom nav */
.bottom-nav{position:absolute;bottom:0;left:0;right:0;height:72px;background:linear-gradient(to top,#0A0A0A,rgba(10,10,10,0.96));border-top:1px solid rgba(255,255,255,0.05);display:flex;align-items:flex-end;justify-content:space-around;padding-bottom:10px;}
.nav-tab{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding-top:8px;}
.nav-tab .ni{font-size:22px;opacity:0.45;transition:opacity 0.2s;}
.nav-tab.active .ni{opacity:1;}
.nav-tab .nl{font-family:'Bebas Neue',cursive;font-size:9px;letter-spacing:2px;color:var(--tm);}
.nav-tab.active .nl{color:var(--primary);}
.nav-tab .ndot{width:4px;height:4px;border-radius:50%;background:var(--primary);margin:0 auto;}
.nav-center{display:flex;flex-direction:column;align-items:center;margin-top:-24px;}
.nav-center .ncirc{width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,#FF5E1A,#FF8C42);display:flex;align-items:center;justify-content:center;font-size:26px;box-shadow:0 0 20px rgba(255,94,26,0.5);cursor:pointer;transition:transform 0.2s;}
.nav-center .ncirc:hover{transform:scale(1.06);}
.nav-center .nl{font-family:'Bebas Neue',cursive;font-size:9px;letter-spacing:2px;color:var(--tm);margin-top:3px;}

.nav-pill{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:100;background:rgba(20,20,20,0.9);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.08);border-radius:100px;display:flex;align-items:center;gap:8px;padding:8px 16px;font-family:'Bebas Neue',cursive;font-size:12px;letter-spacing:2px;color:var(--tm);}
.nav-pill a{color:var(--primary);text-decoration:none;}
</style>
</head>
<body>
<canvas id="aurora"></canvas>
<div class="nav-pill"><a href="04-mode-select.html">← 04</a><span>·</span><span style="color:var(--primary)">05</span><span>HOME</span><span>·</span><a href="06-log.html">06 →</a></div>

<div class="phone">
  <div class="scroll">
    <div class="header">
      <div class="header-left">
        <p>TODAY'S DUO</p>
        <h2>KARIM &amp; AYA</h2>
      </div>
      <div class="avatars">
        <div class="ava" style="z-index:2">🐯</div>
        <div class="ava" style="margin-left:-12px;z-index:1">🦋</div>
      </div>
    </div>

    <!-- Streak card -->
    <div class="streak-card">
      <div class="orb-bg"></div>
      <div class="streak-top">
        <span class="flame-big">🔥</span>
        <div>
          <div style="display:flex;align-items:flex-end;gap:8px">
            <span class="streak-num" id="streakNum">0</span>
            <div style="padding-bottom:12px">
              <div class="streak-label">DAYS</div>
              <div class="streak-sub">IN A ROW</div>
            </div>
          </div>
        </div>
      </div>
      <div class="duo-row">
        <div class="duo-pill"><span>✅</span><div><div class="duo-name">Karim</div><div class="duo-status">Logged</div></div></div>
        <div class="duo-pill"><span>⏳</span><div><div class="duo-name">Aya</div><div class="duo-status">Pending</div></div></div>
      </div>
      <div class="day-strip">
        <div class="day-col"><span class="day-lbl">M</span><div class="day-pip done">🔥</div></div>
        <div class="day-col"><span class="day-lbl">T</span><div class="day-pip done">🔥</div></div>
        <div class="day-col"><span class="day-lbl">W</span><div class="day-pip done">🔥</div></div>
        <div class="day-col"><span class="day-lbl">T</span><div class="day-pip done">🔥</div></div>
        <div class="day-col"><span class="day-lbl">F</span><div class="day-pip done">🔥</div></div>
        <div class="day-col"><span class="day-lbl">S</span><div class="day-pip today">•</div></div>
        <div class="day-col"><span class="day-lbl">S</span><div class="day-pip empty"></div></div>
      </div>
    </div>

    <!-- Quick actions -->
    <div class="actions">
      <button class="act-btn primary" onclick="location.href='06-log.html'"><span class="act-icon">📸</span><span class="act-lbl">LOG</span></button>
      <button class="act-btn secondary" onclick="location.href='07-evolve.html'"><span class="act-icon">⭐</span><span class="act-lbl">EVOLVE</span></button>
      <button class="act-btn secondary" onclick="location.href='08-nutrition.html'"><span class="act-icon">🥗</span><span class="act-lbl">FUEL</span></button>
    </div>

    <!-- Today's pose -->
    <div class="card">
      <div class="card-icon-box">🧘</div>
      <div class="flex-1">
        <div class="card-title-lbl">TODAY'S POSE</div>
        <div class="card-title">POWER STANCE</div>
        <div class="card-sub">Hold 45 sec each side</div>
      </div>
      <span style="font-size:24px">🥉</span>
    </div>

    <!-- Locked cards -->
    <div class="section-lbl">UNLOCKABLES</div>
    <div class="h-scroll">
      <div class="locked-card"><span>🥈</span><span class="locked-name">🔒 SILVER</span></div>
      <div class="locked-card"><span>🥇</span><span class="locked-name">🔒 GOLD</span></div>
      <div class="locked-card"><span>💎</span><span class="locked-name">🔒 DIAMOND</span></div>
    </div>
  </div>

  <!-- Bottom nav -->
  <div class="bottom-nav">
    <div class="nav-tab active" onclick=""><span class="ni">⊞</span><span class="nl">HOME</span><div class="ndot"></div></div>
    <div class="nav-center" onclick="location.href='06-log.html'"><div class="ncirc">📸</div><span class="nl">LOG</span></div>
    <div class="nav-tab" onclick="location.href='07-evolve.html'"><span class="ni" style="opacity:0.45">⭐</span><span class="nl">EVOLVE</span></div>
    <div class="nav-tab" onclick="location.href='08-nutrition.html'"><span class="ni" style="opacity:0.45">🥗</span><span class="nl">FUEL</span></div>
  </div>
</div>

<script>
// CountUp
let v=0,target=14;
const el=document.getElementById('streakNum');
(function count(){v+=1;el.textContent=v;if(v<target)setTimeout(count,80);})();

const canvas=document.getElementById('aurora'),ctx=canvas.getContext('2d');
let W,H;const resize=()=>{W=canvas.width=innerWidth;H=canvas.height=innerHeight;};resize();window.addEventListener('resize',resize);
const blobs=[{x:0.8,y:0.1,dx:-0.0001,dy:0.0002,r:0.45,c:'#FF5E1A'},{x:0.2,y:0.8,dx:0.0001,dy:-0.0001,r:0.35,c:'#FF8C42'}];
(function draw(){ctx.clearRect(0,0,W,H);ctx.fillStyle='#0A0A0A';ctx.fillRect(0,0,W,H);blobs.forEach(b=>{b.x+=b.dx;b.y+=b.dy;if(b.x<0||b.x>1)b.dx*=-1;if(b.y<0||b.y>1)b.dy*=-1;const g=ctx.createRadialGradient(b.x*W,b.y*H,0,b.x*W,b.y*H,b.r*Math.max(W,H));g.addColorStop(0,b.c+'1A');g.addColorStop(1,'transparent');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);});requestAnimationFrame(draw);})();
</script>
</body>
