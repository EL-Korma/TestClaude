<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>01 · Splash — TwinFit</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#FF5E1A;--bg:#0A0A0A;--s0:#141414;--tp:#F5F0EA;--tm:#7A7570;}
html,body{height:100%;background:var(--bg);font-family:'DM Sans',sans-serif;overflow:hidden;}
canvas{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;}
.phone{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);width:390px;height:844px;max-height:100vh;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);border-radius:40px;box-shadow:0 0 80px rgba(255,94,26,0.15),inset 0 0 0 1px rgba(255,255,255,0.07);}
@media(max-width:420px){.phone{border-radius:0;width:100vw;height:100vh;max-height:none;box-shadow:none;top:0;left:0;transform:none;}}

/* Rings */
.rings-wrap{position:relative;width:300px;height:300px;display:flex;align-items:center;justify-content:center;margin-bottom:32px;}
.ring{position:absolute;border-radius:50%;border-style:dashed;border-color:rgba(255,94,26,0.3);border-width:1px;}
.r1{width:300px;height:300px;animation:spinR 8s linear infinite;}
.r2{width:220px;height:220px;animation:spinR 12s linear infinite reverse;}
@keyframes spinR{to{transform:rotate(360deg)}}

.flame{font-size:64px;animation:flPulse 2s ease-in-out infinite;position:relative;z-index:2;filter:drop-shadow(0 0 20px rgba(255,94,26,0.6));}
@keyframes flPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}

/* Brand */
.brand{text-align:center;padding:0 32px;animation:fadeUp 0.8s ease 0.4s both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

h1{font-family:'Bebas Neue',cursive;font-size:88px;letter-spacing:6px;line-height:1;
  background:linear-gradient(135deg,#FF5E1A 0%,#FF8C42 50%,#FFB380 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px;}
.tagline{font-size:11px;letter-spacing:3.5px;color:var(--tm);margin-bottom:40px;}

/* Buttons */
.btns{width:100%;max-width:300px;display:flex;flex-direction:column;gap:12px;}
.btn-primary{
  height:56px;border-radius:16px;border:none;cursor:pointer;
  font-family:'Bebas Neue',cursive;font-size:18px;letter-spacing:3px;color:#fff;
  background:linear-gradient(135deg,#FF5E1A,#FF8C42);
  box-shadow:0 0 28px rgba(255,94,26,0.45);
  transition:all 0.2s ease;
}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 0 40px rgba(255,94,26,0.6);}
.btn-primary:active{transform:translateY(0);}
.btn-ghost{
  height:56px;border-radius:16px;cursor:pointer;
  font-family:'Bebas Neue',cursive;font-size:18px;letter-spacing:3px;
  color:#FF5E1A;background:transparent;
  border:1px solid rgba(255,94,26,0.4);
  transition:all 0.2s ease;
}
.btn-ghost:hover{border-color:#FF5E1A;background:rgba(255,94,26,0.08);}

/* Nav pill */
.nav-pill{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:100;
  background:rgba(20,20,20,0.9);backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.08);border-radius:100px;
  display:flex;align-items:center;gap:8px;padding:8px 16px;
  font-family:'Bebas Neue',cursive;font-size:12px;letter-spacing:2px;color:var(--tm);}
.nav-pill a{color:var(--primary);text-decoration:none;}
.nav-pill a:hover{text-decoration:underline;}

/* Particles */
.particle{position:absolute;border-radius:50%;background:rgba(255,94,26,0.5);pointer-events:none;animation:float-up linear infinite;}
@keyframes float-up{0%{opacity:0;transform:translateY(0) scale(0.5)}10%{opacity:1}90%{opacity:0.3}100%{opacity:0;transform:translateY(-300px) scale(1.2)}}
</style>
</head>
<body>
<canvas id="aurora"></canvas>

<div class="nav-pill">
  <a href="index.html">← HUB</a>
  <span>·</span>
  <span style="color:var(--primary)">01</span>
  <span>SPLASH</span>
  <span>·</span>
  <a href="02-login.html">02 →</a>
</div>

<div class="phone" id="phone">
  <div class="rings-wrap">
    <div class="ring r1"></div>
    <div class="ring r2"></div>
    <span class="flame">🔥</span>
  </div>

  <div class="brand">
    <h1>TWINFIT</h1>
    <p class="tagline">STREAK TOGETHER · GROW TOGETHER</p>
    <div class="btns">
      <button class="btn-primary" onclick="location.href='04-mode-select.html'">GET STARTED</button>
      <button class="btn-ghost" onclick="location.href='02-login.html'">I HAVE AN ACCOUNT</button>
    </div>
  </div>
</div>

<script>
// Aurora
const canvas=document.getElementById('aurora'),ctx=canvas.getContext('2d');
let W,H;
const resize=()=>{W=canvas.width=innerWidth;H=canvas.height=innerHeight;};
resize();window.addEventListener('resize',resize);
const blobs=[
  {x:0.3,y:0.4,dx:0.0002,dy:0.0001,r:0.5,c:'#FF5E1A'},
  {x:0.7,y:0.3,dx:-0.0001,dy:0.0002,r:0.4,c:'#FF8C42'},
  {x:0.5,y:0.8,dx:0.0001,dy:-0.0002,r:0.35,c:'#FF5E1A'},
];
(function draw(){
  ctx.clearRect(0,0,W,H);ctx.fillStyle='#0A0A0A';ctx.fillRect(0,0,W,H);
  blobs.forEach(b=>{
    b.x+=b.dx;b.y+=b.dy;
    if(b.x<0||b.x>1)b.dx*=-1;if(b.y<0||b.y>1)b.dy*=-1;
    const g=ctx.createRadialGradient(b.x*W,b.y*H,0,b.x*W,b.y*H,b.r*Math.max(W,H));
    g.addColorStop(0,b.c+'30');g.addColorStop(1,'transparent');
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  });
  requestAnimationFrame(draw);
})();

// Spawn particles
const phone=document.getElementById('phone');
function spawnParticle(){
  const p=document.createElement('div');
  p.className='particle';
  const size=Math.random()*3+1;
  p.style.cssText=`width:${size}px;height:${size}px;left:${Math.random()*100}%;bottom:0;animation-duration:${Math.random()*4+3}s;animation-delay:${Math.random()*2}s;opacity:0;`;
  phone.appendChild(p);
  setTimeout(()=>p.remove(),8000);
}
setInterval(spawnParticle,300);
</script>
</body>
</html>
