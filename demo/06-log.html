<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>06 · Log Session — TwinFit</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#FF5E1A;--bg:#0A0A0A;--s0:#141414;--s1:#1C1C1C;--s2:#242424;--tp:#F5F0EA;--tm:#7A7570;}
html,body{height:100%;background:#0A0A0A;font-family:'DM Sans',sans-serif;}
canvas{position:fixed;inset:0;pointer-events:none;}
.phone{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);width:390px;height:844px;max-height:100vh;background:var(--bg);border-radius:40px;box-shadow:0 0 80px rgba(255,94,26,0.12),inset 0 0 0 1px rgba(255,255,255,0.07);overflow:hidden;display:flex;flex-direction:column;}
@media(max-width:420px){.phone{border-radius:0;width:100vw;height:100vh;top:0;left:0;transform:none;}}

.inner{flex:1;overflow-y:auto;scrollbar-width:none;padding:52px 22px 24px;display:flex;flex-direction:column;gap:14px;}
.inner::-webkit-scrollbar{display:none;}

.topbar{display:flex;align-items:center;gap:12px;}
.back-btn{width:38px;height:38px;border-radius:12px;background:var(--s0);border:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--tp);font-size:18px;text-decoration:none;transition:border-color 0.2s;flex-shrink:0;}
.back-btn:hover{border-color:var(--primary);}
.topbar h1{font-family:'Bebas Neue',cursive;font-size:28px;letter-spacing:2px;color:var(--tp);}
.topbar p{font-size:11px;color:var(--tm);}

/* Duo status */
.duo-row{display:flex;align-items:center;gap:6px;}
.duo-pill{display:flex;align-items:center;gap:7px;padding:8px 14px;border-radius:12px;}
.duo-pill.done{background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.25);}
.duo-pill.pending{background:var(--s0);border:1px solid rgba(255,255,255,0.06);}
.duo-pill span{font-family:'Bebas Neue',cursive;font-size:13px;letter-spacing:1px;}
.duo-pill.done span{color:#22C55E;}
.duo-pill.pending span{color:var(--tm);}
.dots{display:flex;gap:4px;}
.dot{width:4px;height:4px;border-radius:50%;background:var(--td);}

/* Viewfinder */
.viewfinder{position:relative;border-radius:24px;overflow:hidden;background:#0D0D0D;border:1px solid rgba(255,255,255,0.06);height:300px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.scan-line{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--primary),rgba(255,94,26,0.5),transparent);box-shadow:0 0 8px var(--primary);animation:scanAnim 2.5s ease-in-out infinite;top:0;}
@keyframes scanAnim{0%,100%{top:0;opacity:0.9}50%{top:calc(100% - 2px);opacity:0.5}}
.bracket{position:absolute;width:32px;height:32px;}
.bracket.tl{top:14px;left:14px;border-top:2px solid var(--primary);border-left:2px solid var(--primary);border-radius:8px 0 0 0;}
.bracket.tr{top:14px;right:14px;border-top:2px solid var(--primary);border-right:2px solid var(--primary);border-radius:0 8px 0 0;}
.bracket.br{bottom:14px;right:14px;border-bottom:2px solid var(--primary);border-right:2px solid var(--primary);border-radius:0 0 8px 0;}
.bracket.bl{bottom:14px;left:14px;border-bottom:2px solid var(--primary);border-left:2px solid var(--primary);border-radius:0 0 0 8px;}
.silhouette{font-size:72px;animation:float 3s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.vf-hint{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);font-size:10px;letter-spacing:2px;color:var(--tm);white-space:nowrap;background:rgba(0,0,0,0.5);padding:4px 12px;border-radius:20px;}

/* Tip card */
.tip{background:var(--s0);border:1px solid rgba(255,255,255,0.06);border-radius:18px;padding:14px 16px;display:flex;align-items:center;gap:12px;}
.tip-icon{font-size:22px;flex-shrink:0;}
.tip p{font-size:12px;color:var(--tm);line-height:1.6;}

/* Actions */
.action-row{display:flex;align-items:center;gap:12px;margin-top:auto;}
.side-btn{width:52px;height:52px;border-radius:14px;background:var(--s0);border:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;flex-shrink:0;transition:border-color 0.2s;}
.side-btn:hover{border-color:rgba(255,94,26,0.4);}
.snap-btn{flex:1;height:64px;border-radius:18px;border:none;cursor:pointer;font-family:'Bebas Neue',cursive;font-size:22px;letter-spacing:3px;color:#fff;background:linear-gradient(135deg,#FF5E1A,#FF8C42);box-shadow:0 0 24px rgba(255,94,26,0.4);transition:all 0.2s;}
.snap-btn:hover{transform:translateY(-2px);box-shadow:0 0 40px rgba(255,94,26,0.6);}
.snap-btn:active{transform:scale(0.96);}

/* Success */
.success{display:none;flex-direction:column;align-items:center;text-align:center;padding:32px 20px;gap:12px;flex:1;justify-content:center;}
.success.show{display:flex;}
.success-icon{font-size:72px;animation:popIn 0.5s ease both;}
@keyframes popIn{from{transform:scale(0)}to{transform:scale(1)}}
.success h2{font-family:'Bebas Neue',cursive;font-size:36px;letter-spacing:3px;color:#22C55E;}
.success p{font-size:13px;color:var(--tm);}
.success-duo{display:flex;gap:10px;margin-top:8px;}
.sduo{display:flex;align-items:center;gap:8px;padding:10px 16px;border-radius:14px;}
.sduo.done{background:rgba(34,197,94,0.1);}
.sduo.wait{background:var(--s0);}
.sduo span{font-family:'Bebas Neue',cursive;font-size:14px;}
.sduo.done span{color:#22C55E;}
.sduo.wait span{color:var(--tm);}

.btn-primary{width:100%;height:56px;border-radius:16px;border:none;cursor:pointer;font-family:'Bebas Neue',cursive;font-size:20px;letter-spacing:3px;color:#fff;background:linear-gradient(135deg,#FF5E1A,#FF8C42);box-shadow:0 0 24px rgba(255,94,26,0.35);transition:all 0.2s;margin-top:8px;}
.btn-primary:hover{transform:translateY(-2px);}

.main-content{display:flex;flex-direction:column;gap:14px;flex:1;}

/* Bottom nav */
.bottom-nav{height:72px;background:linear-gradient(to top,#0A0A0A,rgba(10,10,10,0.96));border-top:1px solid rgba(255,255,255,0.05);display:flex;align-items:flex-end;justify-content:space-around;padding-bottom:10px;flex-shrink:0;}
.nav-tab{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding-top:8px;}
.nav-tab .ni{font-size:22px;opacity:0.45;}
.nav-tab .nl{font-family:'Bebas Neue',cursive;font-size:9px;letter-spacing:2px;color:var(--tm);}
.nav-tab.active .ni{opacity:1;}
.nav-tab.active .nl{color:var(--primary);}
.nav-center{display:flex;flex-direction:column;align-items:center;margin-top:-24px;}
.nav-center .ncirc{width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,#FF5E1A,#FF8C42);display:flex;align-items:center;justify-content:center;font-size:26px;box-shadow:0 0 20px rgba(255,94,26,0.5);cursor:pointer;}
.nav-center .nl{font-family:'Bebas Neue',cursive;font-size:9px;letter-spacing:2px;color:var(--primary);margin-top:3px;}

.nav-pill{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:100;background:rgba(20,20,20,0.9);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.08);border-radius:100px;display:flex;align-items:center;gap:8px;padding:8px 16px;font-family:'Bebas Neue',cursive;font-size:12px;letter-spacing:2px;color:var(--tm);}
.nav-pill a{color:var(--primary);text-decoration:none;}
</style>
</head>
<body>
<canvas id="aurora"></canvas>
<div class="nav-pill"><a href="05-home.html">← 05</a><span>·</span><span style="color:var(--primary)">06</span><span>LOG</span><span>·</span><a href="07-evolve.html">07 →</a></div>

<div class="phone">
  <div class="inner" id="mainInner">
    <div class="topbar">
      <a class="back-btn" href="05-home.html">←</a>
      <div><h1>LOG SESSION</h1><p>Snap your pose to log today</p></div>
    </div>

    <div id="mainContent" class="main-content">
      <div class="duo-row">
        <div class="duo-pill done"><span>✅</span><span>Karim</span></div>
        <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
        <div class="duo-pill pending"><span>⏳</span><span>Aya</span></div>
      </div>

      <div class="viewfinder">
        <div class="scan-line"></div>
        <div class="bracket tl"></div><div class="bracket tr"></div>
        <div class="bracket br"></div><div class="bracket bl"></div>
        <div class="silhouette">🧘</div>
        <div class="vf-hint">MATCH THE POSE · STAY IN FRAME</div>
      </div>

      <div class="tip">
        <span class="tip-icon">💡</span>
        <p>Match the pose and hold still — the AI captures it automatically.</p>
      </div>

      <div class="action-row">
        <button class="side-btn">🖼️</button>
        <button class="snap-btn" onclick="snap()">SNAP IT</button>
        <button class="side-btn">🔄</button>
      </div>
    </div>

    <div class="success" id="successState">
      <span class="success-icon">✅</span>
      <h2>SESSION LOGGED!</h2>
      <p>Streak maintained 🔥 Waiting for Aya…</p>
      <div class="success-duo">
        <div class="sduo done"><span>✅ Karim</span></div>
        <div class="sduo wait"><span>⏳ Aya</span></div>
      </div>
      <button class="btn-primary" onclick="location.href='05-home.html'">BACK TO HOME</button>
    </div>
  </div>

  <div class="bottom-nav">
    <div class="nav-tab" onclick="location.href='05-home.html'"><span class="ni">⊞</span><span class="nl">HOME</span></div>
    <div class="nav-center"><div class="ncirc">📸</div><span class="nl">LOG</span></div>
    <div class="nav-tab" onclick="location.href='07-evolve.html'"><span class="ni">⭐</span><span class="nl">EVOLVE</span></div>
    <div class="nav-tab" onclick="location.href='08-nutrition.html'"><span class="ni">🥗</span><span class="nl">FUEL</span></div>
  </div>
</div>

<script>
function snap(){
  document.getElementById('mainContent').style.display='none';
  document.getElementById('successState').classList.add('show');
}
const canvas=document.getElementById('aurora'),ctx=canvas.getContext('2d');
let W,H;const resize=()=>{W=canvas.width=innerWidth;H=canvas.height=innerHeight;};resize();window.addEventListener('resize',resize);
const blobs=[{x:0.5,y:0.3,dx:0.0001,dy:0.0001,r:0.4,c:'#FF5E1A'}];
(function draw(){ctx.clearRect(0,0,W,H);ctx.fillStyle='#0A0A0A';ctx.fillRect(0,0,W,H);blobs.forEach(b=>{b.x+=b.dx;b.y+=b.dy;if(b.x<0||b.x>1)b.dx*=-1;if(b.y<0||b.y>1)b.dy*=-1;const g=ctx.createRadialGradient(b.x*W,b.y*H,0,b.x*W,b.y*H,b.r*Math.max(W,H));g.addColorStop(0,b.c+'15');g.addColorStop(1,'transparent');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);});requestAnimationFrame(draw);})();
</script>
</body>
</html>
