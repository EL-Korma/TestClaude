version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: twinfit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - twinfit_pgdata:/var/lib/postgresql/data

volumes:
  twinfit_pgdata:
